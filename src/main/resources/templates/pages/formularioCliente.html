<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <!--Tailwind-->
    <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/stylesA.css}">

    <title>Crear Cliente</title>
</head>
<body>


<nav class="bg-gray-900 fixed w-full z-20 top-0 start-0 border-b border-gray-200">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
        <a th:href="@{/}" class="flex items-center space-x-3 rtl:space-x-reverse">
            <img src="/imagenes/img000.png" class="h-8" alt="Flowbite Logo">
            <span class="self-center text-2xl font-semibold whitespace-nowrap text-white">MaxFood</span>
        </a>
        <div class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
            <a th:href="@{/}">
                <button type="button"
                        class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center">
                    Regresar
                </button>
            </a>
            <button data-collapse-toggle="navbar-sticky" type="button"
                    class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200"
                    aria-controls="navbar-sticky" aria-expanded="false">
                <span class="sr-only">Open main menu</span>
                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                     viewBox="0 0 17 14">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M1 1h15M1 7h15M1 13h15"/>
                </svg>
            </button>
        </div>
    </div>
</nav>


<div class="seccionFormCliente">

    <div class="flex items-start justify-center min-h-screen ">
        <div class="bg-gray-300 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
            <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Crear Cliente</h2>
            <form th:action="@{/guardarCliente}" method="post" th:object="${cliente}">
                <div class="mb-4">
                    <label for="cedula" class="block text-sm font-medium text-gray-700 mb-1">Ingrese su cédula</label>
                    <input type="text" id="cedula"
                           th:field="*{cedula}"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           maxlength="10"
                           placeholder="cedula"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-500"/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('cedula')}"
                          th:errors="*{cedula}"></span>
                </div>

                <div class="mb-4">
                    <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Ingrese su nombre</label>
                    <input type="text" id="nombre" th:field="*{nombre}"
                           oninput="this.value = this.value.replace(/[^a-zA-ZñÑáéíóúÁÉÍÓÚ\s]/g, '')"
                           placeholder="nombre"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-500"/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('nombre')}"
                          th:errors="*{nombre}"></span>
                </div>

                <div class="mb-4">
                    <label for="apellido" class="block text-sm font-medium text-gray-700 mb-1">Ingrese su
                        apellido</label>
                    <input type="text" id="apellido" th:field="*{apellido}"
                           oninput="this.value = this.value.replace(/[^a-zA-ZñÑáéíóúÁÉÍÓÚ\s]/g, '')"
                           placeholder="apellido"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-500"/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('apellido')}"
                          th:errors="*{apellido}"></span>
                </div>

                <div class="mb-4">
                    <label for="direccion" class="block text-sm font-medium text-gray-700 mb-1">Ingrese su
                        dirección</label>
                    <input type="text" id="direccion" th:field="*{direccion}"
                           placeholder="dirreccion"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-500"/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('direccion')}"
                          th:errors="*{direccion}"></span>
                </div>

                <div class="mb-6">
                    <label for="fechaNacimiento" class="block text-sm font-medium text-gray-700 mb-1">Fecha de
                        nacimiento</label>
                    <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-500"/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('fechaNacimiento')}"
                          th:errors="*{fechaNacimiento}"></span>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                    Guardar
                </button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
