<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <!--Tailwind-->
    <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/stylesA.css}">

    <title>Generar Compra - Factura</title>
</head>
<body>


<nav class="bg-gray-900 fixed w-full z-20 top-0 start-0 border-b border-gray-200">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
        <a th:href="@{/}" class="flex items-center space-x-3 rtl:space-x-reverse">
            <img src="/imagenes/img000.png" class="h-8" alt="Flowbite Logo">
            <span class="self-center text-2xl font-semibold whitespace-nowrap text-white">MaxFood</span>
        </a>
        <div class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
            <a th:href="@{/}">
                <button type="button"
                        class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center">
                    Regresar
                </button>
            </a>
            <button data-collapse-toggle="navbar-sticky" type="button"
                    class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200"
                    aria-controls="navbar-sticky" aria-expanded="false">
                <span class="sr-only">Open main menu</span>
                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                     viewBox="0 0 17 14">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M1 1h15M1 7h15M1 13h15"/>
                </svg>
            </button>
        </div>
    </div>
</nav>


<div class="seccionFormFactura">

    <div class="flex items-start justify-center min-h-screen">
        <div class="bg-red-200 p-8 rounded-2xl shadow-xl w-full max-w-md border border-red-300">
            <h2 class="text-2xl font-bold text-center mb-6 text-red-800">Comprar producto</h2>

            <form th:action="@{/guardarFactura}" method="post" th:object="${factura}">

                <div hidden class="mb-4">
                    <label hidden for="numero" class="block text-sm font-medium text-gray-700 mb-1">numero</label>
                    <input hidden type="text" id="numero" th:field="*{numero}"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-red-500"/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('numero')}"
                          th:errors="*{numero}"></span>
                </div>

                <div class="mb-4">
                    <label for="cantidad" class="block text-sm font-medium text-red-700 mb-1">Ingrese la
                        cantidad:</label>
                    <input type="number" id="cantidad"
                           th:field="*{cantidad}"
                           placeholder="cantidad"
                           class="w-full border border-red-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-red-500" required/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('cantidad')}"
                          th:errors="*{cantidad}"></span>
                </div>

                <!-- Producto -->
                <div class="mb-6">
                    <label for="productos" class="block text-sm font-medium text-red-700 mb-1">Seleccione un
                        producto</label>
                    <select id="productos"
                            th:field="*{producto.codigo}"
                            class="w-full border border-red-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-red-500">
                        <option value="" disabled selected>Seleccione el producto</option>
                        <option th:each="producto : ${productos}"
                                th:value="${producto.codigo}"
                                th:text="${producto.nombre}">
                        </option>
                    </select>
                </div>

                <!-- Cliente -->
                <div class="mb-6">
                    <label for="cliente" class="block text-sm font-medium text-red-700 mb-1">Seleccione un
                        cliente</label>
                    <select id="cliente"
                            th:field="*{cliente.cedula}"
                            class="w-full border border-red-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-red-500">
                        <option value="" disabled selected>Seleccione un cliente</option>
                        <option th:each="cliente : ${clientes}"
                                th:value="${cliente.cedula}"
                                th:text="${cliente.nombre + ' ' + cliente.apellido}">
                    </select>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('cliente')}"
                          th:errors="*{cliente}"></span>
                </div>

                <button type="submit"
                        class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                    Generar Factura
                </button>

            </form>
        </div>
    </div>
</div>

</body>
</html>
