<!DOCTYPE html>
<!-- Vista: Formulario para generar una nueva factura/compra -->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <!-- Librería de componentes UI Flowbite (basada en Tailwind CSS) -->
    <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>

    <!-- Estilos personalizados de la aplicación -->
    <link rel="stylesheet" th:href="@{/css/stylesA.css}">

    <title>Generar Compra - Factura</title>
</head>
<body>

<!-- BARRA DE NAVEGACIÓN SUPERIOR fija en pantalla -->
<nav class="bg-gray-900 fixed w-full z-20 top-0 start-0 border-b border-gray-800">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">

        <!-- Logo → redirige al menú principal al hacer clic -->
        <a th:href="@{/menu}" class="flex items-center space-x-3 rtl:space-x-reverse">
            <img src="/imagenes/img000.png" class="h-8" alt="MaxFood Logo">
            <span class="self-center text-2xl font-semibold whitespace-nowrap text-white">MaxFood</span>
        </a>

        <!-- Botón para regresar al listado de facturas -->
        <div class="flex md:order-2">
            <a th:href="@{/factura/factura}">
                <button type="button"
                        class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center">
                    Volver al menú
                </button>
            </a>
        </div>

    </div>
</nav>


<!-- FORMULARIO DE GENERACIÓN DE FACTURA -->
<div class="seccionFormFactura">

    <div class="flex items-start justify-center min-h-screen">
        <div class="bg-red-200 p-8 rounded-2xl shadow-xl w-full max-w-md border border-red-300">
            <h2 class="text-2xl font-bold text-center mb-6 text-red-800">Comprar producto</h2>

            <!-- Formulario POST hacia FacturaController → /factura/guardarFactura
                 th:object vincula el formulario al objeto "factura" enviado desde el controlador -->
            <form th:action="@{/factura/guardarFactura}" method="post" th:object="${factura}">

                <!-- Token CSRF obligatorio para formularios POST con Spring Security
                     Previene ataques de falsificación de solicitudes entre sitios (Cross-Site Request Forgery) -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- Campo número de factura oculto: se genera automáticamente en el backend -->
                <div hidden class="mb-4">
                    <label hidden for="numero" class="block text-sm font-medium text-gray-700 mb-1">numero</label>
                    <input hidden type="text" id="numero" th:field="*{numero}"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-red-500"/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('numero')}"
                          th:errors="*{numero}"></span>
                </div>

                <!-- Campo cantidad de productos a comprar -->
                <div class="mb-4">
                    <label for="cantidad" class="block text-sm font-medium text-red-700 mb-1">Ingrese la cantidad:</label>
                    <input type="number" id="cantidad"
                           th:field="*{cantidad}"
                           placeholder="cantidad"
                           class="w-full border border-red-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-red-500" required/>
                    <!-- Mensaje de error de validación para el campo cantidad (Bean Validation) -->
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('cantidad')}"
                          th:errors="*{cantidad}"></span>
                </div>

                <!-- Select de productos: carga la lista enviada desde FacturaController
                     th:field vincula el valor al campo producto.codigo del objeto factura (relación Many-to-One) -->
                <div class="mb-6">
                    <label for="productos" class="block text-sm font-medium text-red-700 mb-1">Seleccione un producto</label>
                    <select id="productos"
                            th:field="*{producto.codigo}"
                            class="w-full border border-red-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-red-500">
                        <option value="" disabled selected>Seleccione el producto</option>
                        <!-- Iteración sobre la lista de productos disponibles -->
                        <option th:each="producto : ${productos}"
                                th:value="${producto.codigo}"
                                th:text="${producto.nombre}">
                        </option>
                    </select>
                </div>

                <!-- Select de clientes: carga la lista enviada desde FacturaController
                     th:field vincula el valor al campo cliente.cedula del objeto factura (relación Many-to-One)
                     Muestra nombre completo concatenando nombre + apellido -->
                <div class="mb-6">
                    <label for="cliente" class="block text-sm font-medium text-red-700 mb-1">Seleccione un cliente</label>
                    <select id="cliente"
                            th:field="*{cliente.cedula}"
                            class="w-full border border-red-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-red-500">
                        <option value="" disabled selected>Seleccione un cliente</option>
                        <!-- Iteración sobre la lista de clientes disponibles -->
                        <option th:each="cliente : ${clientes}"
                                th:value="${cliente.cedula}"
                                th:text="${cliente.nombre + ' ' + cliente.apellido}">
                        </option>
                    </select>
                    <!-- Mensaje de error de validación para el campo cliente (Bean Validation) -->
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('cliente')}"
                          th:errors="*{cliente}"></span>
                </div>

                <!-- Botón de envío del formulario -->
                <button type="submit"
                        class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                    Generar Factura
                </button>

            </form>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="bg-gray-900 text-white">
    <div class="mx-auto w-full max-w-screen-xl p-6 lg:py-8">

        <!-- Información de contacto del negocio -->
        <div class="text-center mb-6">
            <img src="/imagenes/img000.png" class="h-8 mx-auto mb-2" alt="MaxFood Logo" />
            <span class="text-2xl font-semibold">Carnicería MaxFood</span>
            <p class="mt-2 text-gray-400 text-sm">
                Av. de los Cortes 456, Sector Central, Ciudad Mercado<br />
                Teléfono: +593 99 123 4567<br />
                Email: contacto@maxfood.com
            </p>
        </div>

        <!-- Links a redes sociales del negocio -->
        <div class="flex justify-center gap-6 mb-6">
            <a href="https://www.facebook.com" target="_blank" class="text-gray-400 hover:text-blue-400 hover:underline">Facebook</a>
            <a href="https://twitter.com" target="_blank" class="text-gray-400 hover:text-blue-400 hover:underline">Twitter</a>
            <a href="https://www.instagram.com" target="_blank" class="text-gray-400 hover:text-blue-400 hover:underline">Instagram</a>
            <a href="https://www.linkedin.com" target="_blank" class="text-gray-400 hover:text-blue-400 hover:underline">LinkedIn</a>
        </div>

        <hr class="my-6 border-gray-700 sm:mx-auto lg:my-8" />

        <!-- Pie de página con derechos reservados -->
        <div class="text-center">
            <span class="text-sm text-gray-400">
                © 2025 Carnicería MaxFood™. Todos los derechos reservados.
            </span>
        </div>
    </div>
</footer>

</body>
</html>
