<!DOCTYPE html>
<!-- Vista: Lista de todos los clientes registrados en el sistema -->
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <!-- Librería de componentes UI Flowbite (basada en Tailwind CSS) -->
    <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>

    <!-- Estilos personalizados de la aplicación -->
    <link rel="stylesheet" th:href="@{/css/stylesA.css}">

    <title>Clientes</title>
</head>
<body class="bg-gray-100 text-gray-800">

<!-- BARRA DE NAVEGACIÓN SUPERIOR fija en pantalla -->
<nav class="bg-gray-900 fixed w-full z-20 top-0 start-0 border-b border-gray-800">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">

        <!-- Logo → redirige al menú principal al hacer clic -->
        <a th:href="@{/menu}" class="flex items-center space-x-3 rtl:space-x-reverse">
            <img src="/imagenes/img000.png" class="h-8" alt="MaxFood Logo">
            <span class="self-center text-2xl font-semibold whitespace-nowrap text-white">MaxFood</span>
        </a>

        <!-- Botón para regresar al menú principal -->
        <div class="flex md:order-2">
            <a th:href="@{/menu}">
                <button type="button"
                        class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center">
                    Volver al menú
                </button>
            </a>
        </div>

    </div>
</nav>


<!-- CONTENIDO PRINCIPAL: tabla de clientes -->
<div class="tablas">

    <div class="w-full py-10">
        <h2 class="text-3xl font-bold mb-6 text-center">Lista de Clientes</h2>

        <!-- Formulario de búsqueda por cédula → llama a ClienteController GET /cliente/clientes?buscarCedula=...
             th:value mantiene el texto escrito después de hacer la búsqueda (persistencia del input) -->
        <form th:action="@{/cliente/clientes}" method="get" class="mb-6 flex justify-center">
            <input type="text" name="buscarCedula"
                   placeholder="Buscar por cédula"
                   class="px-4 py-2 border rounded-l-lg"
                   th:value="${buscarCedula}">
            <button type="submit"
                    class="bg-blue-600 text-white px-4 py-2 rounded-r-lg hover:bg-blue-700">
                Buscar
            </button>
        </form>

        <!-- Tabla con scroll horizontal en pantallas pequeñas -->
        <div class="overflow-x-auto bg-white shadow-md rounded-lg border border-gray-200 mx-auto w-[95%]">
            <table class="w-full divide-y divide-gray-200">

                <!-- Encabezados de columnas -->
                <thead class="bg-gray-800 text-white">
                <tr>
                    <th class="px-4 py-3 text-left text-sm font-medium uppercase tracking-wider">Cédula</th>
                    <th class="px-4 py-3 text-left text-sm font-medium uppercase tracking-wider">Nombre</th>
                    <th class="px-4 py-3 text-left text-sm font-medium uppercase tracking-wider">Apellido</th>
                    <th class="px-4 py-3 text-left text-sm font-medium uppercase tracking-wider">Dirección</th>
                    <th class="px-4 py-3 text-left text-sm font-medium uppercase tracking-wider">Nacimiento</th>
                    <th class="px-4 py-3 text-center text-sm font-medium uppercase tracking-wider">Opciones</th>
                </tr>
                </thead>

                <tbody class="bg-white divide-y divide-gray-200">

                <!-- Mensaje vacío: se muestra si la lista de clientes es nula o no tiene registros -->
                <tr th:if="${clientes == null or clientes.isEmpty()}">
                    <td colspan="11" class="text-center py-6 text-gray-500 font-semibold">
                        No hay resultados disponibles
                    </td>
                </tr>

                <!-- Iteración sobre la lista de clientes enviada desde ClienteController -->
                <tr th:each="cliente : ${clientes}">

                    <!-- Datos del cliente (la cédula actúa como clave primaria de tipo String) -->
                    <td class="px-4 py-4 whitespace-nowrap" th:text="${cliente.cedula}"></td>
                    <td class="px-4 py-4 whitespace-nowrap" th:text="${cliente.nombre}"></td>
                    <td class="px-4 py-4 whitespace-nowrap" th:text="${cliente.apellido}"></td>
                    <td class="px-4 py-4 whitespace-nowrap" th:text="${cliente.direccion}"></td>
                    <td class="px-4 py-4 whitespace-nowrap" th:text="${cliente.fechaNacimiento}"></td>

                    <!-- Botones de acción por cada fila -->
                    <td class="px-4 py-4 whitespace-nowrap text-center">

                        <!-- Botón Actualizar → redirige al formulario precargado con los datos del cliente -->
                        <a th:href="@{/cliente/editarCliente/{cedula}(cedula=${cliente.cedula})}"
                           class="inline-block bg-yellow-400 hover:bg-yellow-500 text-white text-sm font-medium py-1 px-3 rounded mr-2">
                            Actualizar
                        </a>

                        <!-- Botón Eliminar → llama al endpoint que elimina el cliente por su cédula -->
                        <a th:href="@{/cliente/eliminarCliente/{cedula}(cedula=${cliente.cedula})}"
                           class="inline-block bg-red-500 hover:bg-red-600 text-white text-sm font-medium py-1 px-3 rounded">
                            Eliminar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Botón para ir al formulario de registro de un nuevo cliente -->
    <div class="mt-6 text-center">
        <a th:href="@{/cliente/irFormCliente}"
           class="inline-block bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-5 rounded-lg transition">
            Nuevo Cliente
        </a>
    </div>

</div>

</body>
</html>
