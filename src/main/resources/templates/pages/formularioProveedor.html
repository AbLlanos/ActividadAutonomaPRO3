<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <!--Tailwind-->
    <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/stylesA.css}">

    <title>Crear Proveedor</title>
</head>
<body>

<nav class="bg-gray-900 fixed w-full z-20 top-0 start-0 border-b border-gray-800">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">

        <!-- Logo -->
        <a th:href="@{/menu}" class="flex items-center space-x-3 rtl:space-x-reverse">
            <img src="/imagenes/img000.png" class="h-8" alt="MaxFood Logo">
            <span class="self-center text-2xl font-semibold whitespace-nowrap text-white">MaxFood</span>
        </a>

        <!-- Botón volver al menú -->
        <div class="flex md:order-2">
            <a th:href="@{/proveedor/proveedor}">
                <button type="button"
                        class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center">
                    Volver al menú
                </button>
            </a>
        </div>

    </div>
</nav>






<div class="seccionFormProveedor">

    <div class="flex items-start justify-center min-h-screen pt-24">
        <div class="bg-orange-300 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
            <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Crear Proveedor</h2>
            <form th:action="@{/proveedor/guardarProveedor}" method="post" th:object="${proveedor}">
                <div class="mb-4">
                    <label for="codigo" class="block text-sm font-medium text-gray-700 mb-1">Código de proveedor</label>
                    <input type="text" id="codigo" th:field="*{codigo}"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           placeholder="codigo"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-500"/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></span>
                </div>

                <div class="mb-4">
                    <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre del proveedor</label>
                    <input type="text" id="nombre" th:field="*{nombre}"
                           placeholder="nombre del proveedor"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-500"/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
                </div>

                <div class="mb-6">
                    <label for="direccion" class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
                    <input type="text" id="direccion" th:field="*{direccion}"
                           placeholder="direccion"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring focus:ring-blue-500"/>
                    <span class="text-red-500 text-sm" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></span>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                    Guardar
                </button>
            </form>
        </div>
    </div>

</div>

<!-- Footer simplificado -->
<footer class="bg-gray-900 text-white">
    <div class="mx-auto w-full max-w-screen-xl p-6 lg:py-8">

        <!-- Información de la empresa -->
        <div class="text-center mb-6">
            <img src="/imagenes/img000.png" class="h-8 mx-auto mb-2" alt="MaxFood Logo" />
            <span class="text-2xl font-semibold">Carnicería MaxFood</span>
            <p class="mt-2 text-gray-400 text-sm">
                Av. de los Cortes 456, Sector Central, Ciudad Mercado<br />
                Teléfono: +593 99 123 4567<br />
                Email: contacto@maxfood.com
            </p>
        </div>

        <!-- Redes Sociales -->
        <div class="flex justify-center gap-6 mb-6">
            <a href="https://www.facebook.com" target="_blank" class="text-gray-400 hover:text-blue-400 hover:underline">Facebook</a>
            <a href="https://twitter.com" target="_blank" class="text-gray-400 hover:text-blue-400 hover:underline">Twitter</a>
            <a href="https://www.instagram.com" target="_blank" class="text-gray-400 hover:text-blue-400 hover:underline">Instagram</a>
            <a href="https://www.linkedin.com" target="_blank" class="text-gray-400 hover:text-blue-400 hover:underline">LinkedIn</a>
        </div>

        <hr class="my-6 border-gray-700 sm:mx-auto lg:my-8" />

        <!-- Pie de página -->
        <div class="text-center">
            <span class="text-sm text-gray-400">
                © 2025 Carnicería MaxFood™. Todos los derechos reservados.
            </span>
        </div>
    </div>
</footer>

</body>
</html>
