<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/stylesA.css}">
    <title>MaxFood - Panel</title>
</head>
<body class="bg-gray-100">

<nav class="bg-gray-900 fixed w-full z-20 top-0 start-0 border-b border-gray-800">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
        <a th:href="@{/}" class="flex items-center space-x-3 rtl:space-x-reverse">
            <img src="/imagenes/img000.png" class="h-8" alt="MaxFood Logo">
            <span class="self-center text-2xl font-semibold whitespace-nowrap text-white">MaxFood</span>
        </a>
        <div class="flex md:order-2">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit"
                        class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2">
                    Cerrar sesión
                </button>
            </form>
        </div>
    </div>
</nav>


<!-- Contenido principal -->
<div class="pt-24 pb-10 px-6 max-w-screen-xl mx-auto">

    <h1 class="text-3xl font-bold text-gray-800 mb-2">Panel de administración</h1>
    <p class="text-gray-500 mb-10">Selecciona una sección para continuar</p>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

        <!-- Clientes -->
        <a th:href="@{/cliente/clientes}" class="group h-full">
            <div class="bg-white rounded-2xl shadow-md border border-gray-200 p-6 flex flex-col justify-center items-center text-center h-full hover:shadow-xl hover:border-blue-400 transition duration-200">
                <div class="bg-blue-100 rounded-full p-4 mb-4 group-hover:bg-blue-200 transition duration-200">
                    <svg class="w-10 h-10 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                    </svg>
                </div>
                <h2 class="text-lg font-semibold text-gray-800 mb-1">Clientes</h2>
                <p class="text-sm text-gray-500">Ver y gestionar clientes registrados</p>
            </div>
        </a>

        <!-- Facturas -->
        <a th:href="@{/factura/factura}" class="group h-full">
            <div class="bg-white rounded-2xl shadow-md border border-gray-200 p-6 flex flex-col justify-center items-center text-center h-full hover:shadow-xl hover:border-green-400 transition duration-200">
                <div class="bg-green-100 rounded-full p-4 mb-4 group-hover:bg-green-200 transition duration-200">
                    <svg class="w-10 h-10 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                    </svg>
                </div>
                <h2 class="text-lg font-semibold text-gray-800 mb-1">Facturas</h2>
                <p class="text-sm text-gray-500">Consultar y administrar facturas</p>
            </div>
        </a>

        <!-- Productos -->
        <a th:href="@{/producto/producto}" class="group h-full">
            <div class="bg-white rounded-2xl shadow-md border border-gray-200 p-6 flex flex-col justify-center items-center text-center h-full hover:shadow-xl hover:border-yellow-400 transition duration-200">
                <div class="bg-yellow-100 rounded-full p-4 mb-4 group-hover:bg-yellow-200 transition duration-200">
                    <svg class="w-10 h-10 text-yellow-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/>
                    </svg>
                </div>
                <h2 class="text-lg font-semibold text-gray-800 mb-1">Productos</h2>
                <p class="text-sm text-gray-500">Ver inventario y productos disponibles</p>
            </div>
        </a>

        <!-- Proveedores -->
        <a th:href="@{/proveedor/proveedor}" class="group h-full">
            <div class="bg-white rounded-2xl shadow-md border border-gray-200 p-6 flex flex-col justify-center items-center text-center h-full hover:shadow-xl hover:border-purple-400 transition duration-200">
                <div class="bg-purple-100 rounded-full p-4 mb-4 group-hover:bg-purple-200 transition duration-200">
                    <svg class="w-10 h-10 text-purple-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/>
                    </svg>
                </div>
                <h2 class="text-lg font-semibold text-gray-800 mb-1">Proveedores</h2>
                <p class="text-sm text-gray-500">Gestionar proveedores y suministros</p>
            </div>
        </a>

    </div>
</div>

</body>
</html>
