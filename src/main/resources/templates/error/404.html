<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>

    <link rel="stylesheet" th:href="@{/css/stylesA.css}">
    <title>MaxFood - Página no encontrada</title>
</head>
<body class="bg-gray-100 h-screen">

<div class="flex items-center justify-center h-full m-10">

        <div class="flex justify-center mb-6">

        <p class="text-gray-500 mb-8">La ruta que intentas acceder no existe o fue movida.</p>

        <a th:href="@{/}">
